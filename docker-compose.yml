services:
  postgres:
    image: postgres:17-alpine
    container_name: pdao_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: thesisit
      POSTGRES_DB: pdao_db
    ports:
      - "5440:5432"
    volumes:
      - pdao_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdao_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: .
    container_name: pdao_php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/PWD-Application-System:cached
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    working_dir: /var/www/html/PWD-Application-System
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["apache2-foreground"]

volumes:
  pdao_data:


